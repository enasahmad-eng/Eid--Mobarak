<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Eid Mobarak Heart</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background-color: #050505;
            overflow: hidden;
        }

        .heart-container {
            position: relative;
            width: min(340px, 90vw);
            height: min(340px, 90vw);
        }

        .love-text {
            position: absolute;
            color: #3a8eff;
            font-size: clamp(7px, 2vw, 10px);
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 1px;
            cursor: default;
            user-select: none;
            text-shadow: 0 0 6px rgba(58, 142, 255, 0.8),
                         0 0 14px rgba(58, 142, 255, 0.4);
            opacity: 0;
            transform: translate(-50%, -50%) scale(0);
            animation: appear 2s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards,
                       pulse 2.2s ease-in-out infinite 2s;
            will-change: transform, opacity;
        }

        @keyframes appear {
            0% {
                opacity: 0;
                transform: translate(-50%, -50%) scale(0);
            }
            100% {
                opacity: 1;
                transform: translate(-50%, -50%) scale(1);
            }
        }

        @keyframes pulse {
            0%, 100% {
                transform: translate(-50%, -50%) scale(1);
            }
            50% {
                transform: translate(-50%, -50%) scale(1.12);
                color: #ffe566;
            }
        }

        .particle {
            position: absolute;
            width: 8px;
            height: 8px;
            background: rgba(255, 215, 0, 0.2);
            border-radius: 50%;
            animation: floatUp 5s linear infinite;
            pointer-events: none;
        }

        @keyframes floatUp {
            0% {
                transform: translateY(0) scale(0);
                opacity: 0;
            }
            15% {
                opacity: 0.5;
            }
            85% {
                opacity: 0.3;
            }
            100% {
                transform: translateY(-100vh) scale(1.2);
                opacity: 0;
            }
        }
    </style>
</head>
<body>

    <div class="heart-container" id="heartContainer"></div>

    <script>
        const container = document.getElementById('heartContainer');
        const total = 90;
        const phrase = "Eid Mobarak";

        const size = container.offsetWidth || 300;
        const cx = size / 2;
        const cy = size * 0.44;
        const sx = size / 38;
        const sy = size / 38;

        for (let i = 0; i < total; i++) {
            const t = (i / total) * 2 * Math.PI;
            const x = 16 * Math.pow(Math.sin(t), 3);
            const y = 13 * Math.cos(t) - 5 * Math.cos(2 * t) - 2 * Math.cos(3 * t) - Math.cos(4 * t);

            const span = document.createElement('span');
            span.className = 'love-text';
            span.textContent = phrase;
            span.style.left = `${cx + x * sx}px`;
            span.style.top  = `${cy - y * sy}px`;

            const delay = (i / total) * 1.8;
            span.style.animationDelay = `${delay}s, ${delay + 2}s`;

            container.appendChild(span);
        }

        let pCount = 0;
        const pTimer = setInterval(() => {
            if (pCount++ > 40) {
                clearInterval(pTimer);
                return;
            }
            const p = document.createElement('div');
            p.className = 'particle';
            p.style.left = `${Math.random() * 100}%`;
            p.style.animationDuration = `${Math.random() * 3 + 4}s`;
            p.style.animationDelay = `${Math.random() * 2}s`;
            document.body.appendChild(p);
            setTimeout(() => p.remove(), 7000);
        }, 400);
    </script>

</body>
</html>
